<svg viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg" width="1200" height="420">
  <defs>
    <linearGradient id="bggrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0A0A18"/>
      <stop offset="100%" stop-color="#05050F"/>
    </linearGradient>
    <linearGradient id="redpanel" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#CC1111"/>
      <stop offset="100%" stop-color="#8B0000"/>
    </linearGradient>
    <linearGradient id="bluepanel" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0F2870"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="centrepanel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0D0D20" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#080810" stop-opacity="0.96"/>
    </linearGradient>
    <!-- hex grid -->
    <pattern id="hex" x="0" y="0" width="60" height="52" patternUnits="userSpaceOnUse">
      <polygon points="30,2 58,17 58,45 30,60 2,45 2,17"
               fill="none" stroke="#141430" stroke-width="0.8"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- base -->
  <rect width="1200" height="420" fill="url(#bggrad)"/>
  <rect width="1200" height="420" fill="url(#hex)" opacity="0.5"/>

  <!-- red left armor -->
  <polygon points="0,0 460,0 320,420 0,420" fill="url(#redpanel)" opacity="0.92"/>
  <!-- inner shading layers -->
  <polygon points="0,0 410,0 270,420 0,420" fill="#6B0000" opacity="0.5"/>
  <polygon points="0,0 340,0 200,420 0,420" fill="#3D0000" opacity="0.5"/>
  <!-- red edge line -->
  <line x1="460" y1="0" x2="320" y2="420" stroke="#FF5555" stroke-width="3" opacity="0.9"/>
  <line x1="450" y1="0" x2="310" y2="420" stroke="#FF9999" stroke-width="1" opacity="0.4"/>

  <!-- blue right armor -->
  <polygon points="1200,0 780,0 920,420 1200,420" fill="url(#bluepanel)" opacity="0.92"/>
  <!-- inner shading layers -->
  <polygon points="1200,0 820,0 960,420 1200,420" fill="#0A1A60" opacity="0.5"/>
  <polygon points="1200,0 880,0 1020,420 1200,420" fill="#060F3A" opacity="0.5"/>
  <!-- blue edge line -->
  <line x1="780" y1="0" x2="920" y2="420" stroke="#5599FF" stroke-width="3" opacity="0.9"/>
  <line x1="790" y1="0" x2="930" y2="420" stroke="#99BBFF" stroke-width="1" opacity="0.4"/>

  <!-- dark centre panel so text is always readable -->
  <rect x="310" y="0" width="580" height="420" fill="url(#centrepanel)"/>

  <!-- top red bar -->
  <rect x="0" y="0" width="1200" height="3" fill="#CC1111" opacity="0.9"/>
  <!-- bottom blue bar -->
  <rect x="0" y="417" width="1200" height="3" fill="#1D4ED8" opacity="0.9"/>

  <!-- corner brackets -->
  <polyline points="18,50 18,18 50,18" fill="none" stroke="#CC1111" stroke-width="3.5" stroke-linecap="square"/>
  <polyline points="1182,50 1182,18 1150,18" fill="none" stroke="#1D4ED8" stroke-width="3.5" stroke-linecap="square"/>
  <polyline points="18,370 18,402 50,402" fill="none" stroke="#1D4ED8" stroke-width="3.5" stroke-linecap="square"/>
  <polyline points="1182,370 1182,402 1150,402" fill="none" stroke="#CC1111" stroke-width="3.5" stroke-linecap="square"/>

  <!-- corner rivets -->
  <circle cx="28" cy="80"  r="3.5" fill="#FF4444" opacity="0.7"/>
  <circle cx="28" cy="210" r="3.5" fill="#FF4444" opacity="0.7"/>
  <circle cx="28" cy="340" r="3.5" fill="#FF4444" opacity="0.7"/>
  <circle cx="1172" cy="80"  r="3.5" fill="#4488FF" opacity="0.7"/>
  <circle cx="1172" cy="210" r="3.5" fill="#4488FF" opacity="0.7"/>
  <circle cx="1172" cy="340" r="3.5" fill="#4488FF" opacity="0.7"/>

  <!-- lightning bolt icon -->
  <text x="600" y="80" text-anchor="middle"
        font-family="sans-serif" font-size="40"
        fill="#CC1111" opacity="0.6" filter="url(#glow)">⚡</text>

  <!-- MAIN TITLE — solid white, very large, always readable -->
  <text x="600" y="190"
        text-anchor="middle"
        font-family="'Arial Black', 'Helvetica Neue', Impact, sans-serif"
        font-size="96" font-weight="900"
        fill="#FFFFFF"
        letter-spacing="6"
        filter="url(#glow)">OPTIMUSPRIME</text>

  <!-- red underline accent -->
  <rect x="290" y="204" width="215" height="3" fill="#CC1111" rx="2"/>
  <!-- blue underline accent -->
  <rect x="695" y="204" width="215" height="3" fill="#1D4ED8" rx="2"/>
  <!-- white centre -->
  <rect x="505" y="204" width="190" height="3" fill="#FFFFFF" opacity="0.4" rx="2"/>

  <!-- tagline -->
  <text x="600" y="252"
        text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="16" fill="#9CA3AF" letter-spacing="5">
    THE SESSION STATE PROTOCOL FOR AI CODING
  </text>

  <!-- subtitle -->
  <text x="600" y="290"
        text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="17" fill="#FF5555" letter-spacing="1.5">
    Claude is stateless. Your project isn't.
  </text>

  <!-- v1.0.0 badge — centred, well above stats -->
  <rect x="556" y="308" width="88" height="22" rx="4"
        fill="#CC1111" opacity="0.18" stroke="#CC1111" stroke-width="0.8"/>
  <text x="600" y="323" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="11"
        fill="#FF7777" letter-spacing="3">v 1 . 0 . 0</text>

  <!-- stat badges — three, evenly spaced, clear gap below v-badge -->
  <rect x="248" y="346" width="186" height="40" rx="5"
        fill="#0D0D1E" stroke="#CC1111" stroke-width="1.4"/>
  <text x="341" y="360" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="11" fill="#FF5555">⚡ OUTPUT COMPRESSION</text>
  <text x="341" y="378" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="15" fill="#FFFFFF" font-weight="bold">63.9%</text>

  <rect x="507" y="346" width="186" height="40" rx="5"
        fill="#0D0D1E" stroke="#1D4ED8" stroke-width="1.4"/>
  <text x="600" y="360" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="11" fill="#5599FF">◉ LOOP DETECTION</text>
  <text x="600" y="378" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="15" fill="#FFFFFF" font-weight="bold">100%</text>

  <rect x="766" y="346" width="186" height="40" rx="5"
        fill="#0D0D1E" stroke="#C8C8C8" stroke-width="1.4"/>
  <text x="859" y="360" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="11" fill="#C8C8C8">✓ TESTS PASSING</text>
  <text x="859" y="378" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="15" fill="#FFFFFF" font-weight="bold">145</text>

</svg>
