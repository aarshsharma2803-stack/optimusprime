<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg" width="1200" height="400">
  <defs>
    <!-- Chrome gradient for main title -->
    <linearGradient id="chrome" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="25%"  stop-color="#E8E8E8" stop-opacity="1"/>
      <stop offset="55%"  stop-color="#A0A0A0" stop-opacity="1"/>
      <stop offset="80%"  stop-color="#D0D0D0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#F0F0F0" stop-opacity="1"/>
    </linearGradient>
    <!-- Red glow filter -->
    <filter id="redglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Blue glow filter -->
    <filter id="blueglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Subtle glow for title -->
    <filter id="titleglow" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Hex grid pattern -->
    <pattern id="hex" x="0" y="0" width="56" height="48" patternUnits="userSpaceOnUse">
      <polygon points="28,2 54,16 54,42 28,56 2,42 2,16"
               fill="none" stroke="#12122A" stroke-width="0.8"/>
    </pattern>
    <!-- Red panel gradient -->
    <linearGradient id="redpanel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#991010"/>
      <stop offset="100%" stop-color="#6B0A0A"/>
    </linearGradient>
    <!-- Blue panel gradient -->
    <linearGradient id="bluepanel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1A3A8F"/>
      <stop offset="100%" stop-color="#0F2060"/>
    </linearGradient>
  </defs>

  <!-- ── BASE ── -->
  <rect width="1200" height="400" fill="#05050F"/>
  <rect width="1200" height="400" fill="url(#hex)" opacity="0.6"/>

  <!-- ── RED ARMOR PLATE (LEFT) — angular like Optimus chest ── -->
  <polygon points="0,0 440,0 310,400 0,400" fill="url(#redpanel)"/>
  <!-- inner plate shading -->
  <polygon points="0,0 390,0 260,400 0,400" fill="#7A0A0A" opacity="0.5"/>
  <polygon points="0,0 340,0 210,400 0,400" fill="#550808" opacity="0.4"/>
  <!-- red edge highlight line -->
  <line x1="440" y1="0" x2="310" y2="400" stroke="#FF4444" stroke-width="2.5" opacity="0.8"/>
  <!-- secondary edge -->
  <line x1="420" y1="0" x2="290" y2="400" stroke="#FF6666" stroke-width="1" opacity="0.3"/>

  <!-- ── BLUE ARMOR PLATE (RIGHT) ── -->
  <polygon points="1200,0 800,0 930,400 1200,400" fill="url(#bluepanel)"/>
  <!-- inner plate shading -->
  <polygon points="1200,0 840,0 970,400 1200,400" fill="#0F2870" opacity="0.5"/>
  <polygon points="1200,0 880,0 1010,400 1200,400" fill="#0A1A50" opacity="0.4"/>
  <!-- blue edge highlight -->
  <line x1="800" y1="0" x2="930" y2="400" stroke="#4488FF" stroke-width="2.5" opacity="0.8"/>
  <line x1="820" y1="0" x2="950" y2="400" stroke="#6699FF" stroke-width="1" opacity="0.3"/>

  <!-- ── AMBIENT GLOWS ── -->
  <ellipse cx="80"  cy="200" rx="220" ry="280" fill="#CC1111" opacity="0.08" filter="url(#redglow)"/>
  <ellipse cx="1120" cy="200" rx="220" ry="280" fill="#1D4ED8" opacity="0.08" filter="url(#blueglow)"/>

  <!-- ── BORDER LINES TOP / BOTTOM ── -->
  <rect x="0" y="0"   width="1200" height="2.5" fill="#CC1111" opacity="0.7"/>
  <rect x="0" y="397" width="1200" height="3"   fill="#1D4ED8" opacity="0.7"/>

  <!-- ── MECHANICAL CORNER BRACKETS ── -->
  <!-- top-left -->
  <polyline points="16,48 16,16 48,16" fill="none" stroke="#CC1111" stroke-width="3" stroke-linecap="square"/>
  <!-- top-right -->
  <polyline points="1184,48 1184,16 1152,16" fill="none" stroke="#1D4ED8" stroke-width="3" stroke-linecap="square"/>
  <!-- bottom-left -->
  <polyline points="16,352 16,384 48,384" fill="none" stroke="#1D4ED8" stroke-width="3" stroke-linecap="square"/>
  <!-- bottom-right -->
  <polyline points="1184,352 1184,384 1152,384" fill="none" stroke="#CC1111" stroke-width="3" stroke-linecap="square"/>

  <!-- ── TRANSFORM ICON ── -->
  <text x="600" y="82" text-anchor="middle"
        font-family="serif" font-size="36" fill="#CC1111" opacity="0.5">⚡</text>

  <!-- ── MAIN TITLE SHADOW (depth) ── -->
  <text x="603" y="196"
        text-anchor="middle"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-size="88" font-weight="900"
        fill="#CC1111" opacity="0.12"
        letter-spacing="4">OPTIMUSPRIME</text>

  <!-- ── MAIN TITLE ── -->
  <text x="600" y="193"
        text-anchor="middle"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-size="88" font-weight="900"
        fill="url(#chrome)"
        letter-spacing="4"
        filter="url(#titleglow)">OPTIMUSPRIME</text>

  <!-- ── DIVIDER ── -->
  <line x1="180" y1="212" x2="1020" y2="212"
        stroke="#C8C8C8" stroke-width="0.8" opacity="0.2"/>

  <!-- ── TAGLINE ── -->
  <text x="600" y="258"
        text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="17" fill="#9CA3AF" letter-spacing="5">
    THE SESSION STATE PROTOCOL FOR AI CODING
  </text>

  <!-- ── SUBTITLE ── -->
  <text x="600" y="300"
        text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="16" fill="#EF4444" letter-spacing="1.5">
    Claude is stateless. Your project isn't.
  </text>

  <!-- ── STAT BADGES ── -->
  <!-- compression -->
  <rect x="264" y="336" width="170" height="38" rx="4"
        fill="#0D0D1A" stroke="#CC1111" stroke-width="1.2"/>
  <text x="349" y="360" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="13" fill="#EF4444">
    ⚡ 63.9% compression
  </text>

  <!-- loop detection -->
  <rect x="452" y="336" width="166" height="38" rx="4"
        fill="#0D0D1A" stroke="#1D4ED8" stroke-width="1.2"/>
  <text x="535" y="360" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="13" fill="#60A5FA">
    ◉ 100% loop detect
  </text>

  <!-- tests -->
  <rect x="636" y="336" width="166" height="38" rx="4"
        fill="#0D0D1A" stroke="#C8C8C8" stroke-width="1.2"/>
  <text x="719" y="360" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="13" fill="#D4D4D4">
    ✓ 145 tests passing
  </text>

  <!-- ── ARMOR PLATE RIVETS / DETAILS ── -->
  <!-- left plate rivets -->
  <circle cx="30"  cy="100" r="3" fill="#FF4444" opacity="0.5"/>
  <circle cx="30"  cy="200" r="3" fill="#FF4444" opacity="0.5"/>
  <circle cx="30"  cy="300" r="3" fill="#FF4444" opacity="0.5"/>
  <circle cx="100" cy="50"  r="3" fill="#FF4444" opacity="0.4"/>
  <circle cx="100" cy="350" r="3" fill="#FF4444" opacity="0.4"/>
  <!-- right plate rivets -->
  <circle cx="1170" cy="100" r="3" fill="#4488FF" opacity="0.5"/>
  <circle cx="1170" cy="200" r="3" fill="#4488FF" opacity="0.5"/>
  <circle cx="1170" cy="300" r="3" fill="#4488FF" opacity="0.5"/>
  <circle cx="1100" cy="50"  r="3" fill="#4488FF" opacity="0.4"/>
  <circle cx="1100" cy="350" r="3" fill="#4488FF" opacity="0.4"/>

  <!-- ── VERSION BADGE ── -->
  <rect x="542" y="320" width="116" height="20" rx="3"
        fill="#CC1111" opacity="0.15"/>
  <text x="600" y="334" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="11"
        fill="#FF6666" letter-spacing="2">v 1 . 0 . 0</text>
</svg>
