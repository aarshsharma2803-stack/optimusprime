[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    slow: marks tests as slow (deselect with -m "not slow")
    integration: marks integration tests that run subprocesses

addopts = --tb=short -q

; Coverage config (activate with: pytest --cov=src/optimusprime --cov-report=term-missing)
; Minimum 80% coverage enforced when --cov flag is present:
; addopts = --cov=src/optimusprime --cov-fail-under=80
